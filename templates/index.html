<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שליטה ברובורוק</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-blue { background: #007bff; color: white; }
        .btn-green { background: #28a745; color: white; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; text-align: center; }
        #status { margin-top: 15px; color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>שליטה ברובוט 🧹</h2>
        <div id="auth-section">
            <p>שלב 1: שליחת קוד למייל</p>
            <input type="email" id="email" value="gs6817771@gmail.com" readonly>
            <button class="btn-blue" onclick="requestCode()">שלח קוד אימות</button>
            <hr>
            <p>שלב 2: הזנת הקוד שהתקבל</p>
            <input type="text" id="code" placeholder="הקלידו כאן את הקוד">
            <button class="btn-green" onclick="login()">התחברות לרובוט</button>
        </div>
        <div id="status"></div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        
        async function requestCode() {
            statusDiv.innerText = "שולח בקשה...";
            try {
                // זה השינוי הקריטי - פנייה לכתובת החדשה send_auth
                const res = await fetch('/send_auth'); 
                const data = await res.json();
                statusDiv.innerText = data.status === "ok" ? "✅ הקוד נשלח למייל!" : "❌ שגיאה: " + (data.server_msg || "נסו שוב");
            } catch (e) { 
                statusDiv.innerText = "❌ תקלה בתקשורת: " + e; 
            }
        }

        async function login() {
            const code = document.getElementById('code').value;
            statusDiv.innerText = "מתחבר...";
            // כאן בהמשך נוסיף את הלוגיקה המלאה להתחברות
            statusDiv.innerText = "התחברת! (זמני)";
        }
    </script>
</body>
</html>
