<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שליטה ברובורוק</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-blue { background: #007bff; color: white; }
        .btn-green { background: #28a745; color: white; }
        .btn-red { background: #dc3545; color: white; }
        .btn-orange { background: #fd7e14; color: white; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        #status { margin-top: 20px; color: #555; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>שליטה ברובוט 🧹</h2>
        
        <div id="login-section">
            <button class="btn-blue" onclick="requestCode()">שלח קוד אימות למייל</button>
            <input type="text" id="verification-code" placeholder="הכנס את הקוד מהמייל">
            <button class="btn-green" onclick="login()">התחבר</button>
        </div>

        <div id="controls-section" class="hidden">
            <button class="btn-green" onclick="runAction('start')">הפעל ניקוי ▶️</button>
            <button class="btn-red" onclick="runAction('stop')">עצור ⏸️</button>
            <button class="btn-orange" onclick="runAction('home')">חזור לעמדת טעינה 🏠</button>
        </div>

        <div id="status">ממתין לפעולה...</div>
    </div>

    <script>
        const log = (msg) => document.getElementById('status').innerText = msg;

        async function requestCode() {
            log("שולח בקשה לקוד...");
            const res = await fetch('/request_code');
            const data = await res.json();
            log(data.status === "code_sent" ? "הקוד נשלח! בדקי את המייל" : "שגיאה בשליחת הקוד");
        }

        async function login() {
            const code = document.getElementById('verification-code').value;
            if(!code) return alert("נא להזין קוד");
            log("מתחבר...");
            const res = await fetch(`/login/${code}`);
            const data = await res.json();
            if(data.status === "success") {
                log("מחובר בהצלחה!");
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('controls-section').classList.remove('hidden');
            } else {
                log("התחברות נכשלה. וודאי שהקוד נכון");
            }
        }

        async function runAction(cmd) {
            log(`שולח פקודה: ${cmd}...`);
            const res = await fetch(`/action/${cmd}`);
            const data = await res.json();
            log(`סטטוס: ${data.status}`);
        }
    </script>
</body>
</html>
